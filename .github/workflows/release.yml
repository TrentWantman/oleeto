name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --publish never
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          DMG=$(ls release/*.dmg | head -1)
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          VERSION=${GITHUB_REF_NAME#v}
          git clone https://x-access-token:${TAP_TOKEN}@github.com/TrentWantman/homebrew-tap.git tap
          cd tap
          cat > Casks/oleeto.rb << EOF
          cask "oleeto" do
            version "${VERSION}"
            sha256 "${SHA}"

            url "https://github.com/TrentWantman/oleeto/releases/download/v#{version}/Oleeto-#{version}-arm64.dmg"
            name "oleeto"
            desc "Desktop LeetCode tracker with code editor and GitHub sync"
            homepage "https://github.com/TrentWantman/oleeto"

            app "Oleeto.app"
          end
          EOF
          sed -i '' 's/^          //' Casks/oleeto.rb
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Casks/oleeto.rb
          git commit -m "update oleeto to ${VERSION}"
          git push
